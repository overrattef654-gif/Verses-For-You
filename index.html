<!DOCTYPE html>
<html>
<head>
<title>God Wants to Speak to You</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#fff8e7, #f5e6c8);
  font-family: Georgia, serif;
  text-align: center;
  color: #3b2f2f;
}

.card {
  background: white;
  padding: 35px;
  border-radius: 20px;
  width: 85%;
  max-width: 450px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.cross {
  font-size: 45px;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.subtitle {
  font-style: italic;
  font-size: 18px;
}

#verse {
  margin-top: 30px;
  font-size: 23px;
  line-height: 1.6;
}
</style>

</head>

<body>

<div class="card">
  <div class="cross">✝</div>
  <h1>God Wants to Speak to You</h1>
  <div class="subtitle">A message from His Word</div>

  <div id="verse"></div>
</div>

<script>
const verses = [
"Jeremiah 29:11 — For I know the plans I have for you, declares the Lord, plans to give you hope and a future.",
"Philippians 4:13 — I can do all things through Christ who strengthens me.",
"Psalm 46:10 — Be still, and know that I am God.",
"John 3:16 — For God so loved the world that He gave His one and only Son.",
"Proverbs 3:5 — Trust in the Lord with all your heart."
];

document.getElementById("verse").innerHTML =
verses[Math.floor(Math.random() * verses.length)];
</script>

</body>
</html>
